name: Update Strava Footer

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-strava-footer:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync with latest main before generating data
        run: |
          git fetch origin main
          git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Strava secrets are configured
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          missing=0
          if [ -z "$STRAVA_CLIENT_ID" ]; then echo "Missing STRAVA_CLIENT_ID"; missing=1; else echo "STRAVA_CLIENT_ID is set"; fi
          if [ -z "$STRAVA_CLIENT_SECRET" ]; then echo "Missing STRAVA_CLIENT_SECRET"; missing=1; else echo "STRAVA_CLIENT_SECRET is set"; fi
          if [ -z "$STRAVA_REFRESH_TOKEN" ]; then echo "Missing STRAVA_REFRESH_TOKEN"; missing=1; else echo "STRAVA_REFRESH_TOKEN is set"; fi
          exit $missing

      - name: Generate Strava footer data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/update_strava_footer.py

      - name: Commit updated footer data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Strava footer data"
          file_pattern: data/strava_footer.json
