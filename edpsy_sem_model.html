<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Educational Psychology SEM Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#520671;--accent-soft:#f6f0f8;--text:#161616;--muted:#6e6c66;--light:#9a9890;--rule:#ece9e3}
body{background:#fff;font-family:'DM Sans',sans-serif}
.wrap{max-width:1180px;margin:0 auto}
svg{width:100%;height:auto}

.latent{fill:var(--accent-soft);stroke:var(--accent);stroke-width:2.6}
.latent-muted{fill:#fff;stroke:#b8b3aa;stroke-width:2.2}
.outcome{fill:#fff;stroke:var(--accent);stroke-width:2.8}
.label{font-size:20px;font-weight:600;fill:var(--text)}
.sub{font-size:13px;fill:var(--muted)}
.tiny{font-family:'DM Mono',monospace;font-size:11px;fill:var(--light)}

/* CORRECTED ARROWHEADS */
.path-main{fill:none;stroke:var(--accent);stroke-width:3;marker-end:url(#arrow-accent)}
.path-secondary{fill:none;stroke:var(--accent);stroke-width:2;stroke-dasharray:8 8;marker-end:url(#arrow-accent)}
.path-neg{fill:none;stroke:#9a9890;stroke-width:2.2;stroke-dasharray:7 8;marker-end:url(#arrow-muted)}

</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 1180 520">

<defs>
<!-- properly centered + scaled arrowheads -->
<marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#520671"/>
</marker>

<marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9890"/>
</marker>
</defs>

<!-- nodes -->
<ellipse class="latent" cx="210" cy="150" rx="150" ry="68"/>
<text class="label" x="210" y="145" text-anchor="middle">Metacognition</text>
<text class="sub" x="210" y="170" text-anchor="middle">knowledge + regulation</text>

<ellipse class="latent-muted" cx="210" cy="370" rx="150" ry="62"/>
<text class="label" x="210" y="365" text-anchor="middle">Psychological Distress</text>
<text class="sub" x="210" y="390" text-anchor="middle">depression • anxiety • stress</text>

<ellipse class="latent" cx="610" cy="260" rx="170" ry="78"/>
<text class="label" x="610" y="252" text-anchor="middle">Executive Functioning</text>
<text class="sub" x="610" y="280" text-anchor="middle">monitoring • verification • control</text>

<rect class="outcome" x="925" y="188" width="220" height="144" rx="8"/>
<text class="label" x="1035" y="252" text-anchor="middle">Academic</text>
<text class="label" x="1035" y="278" text-anchor="middle">Achievement</text>

<!-- paths (clean endpoints now aligned) -->
<path class="path-main" d="M360 185 C470 215, 500 235, 500 255"/>
<path class="path-main" d="M780 260 L925 260"/>
<path class="path-secondary" d="M360 120 C600 40, 860 60, 950 188"/>
<path class="path-neg" d="M360 350 C480 320, 510 290, 500 270"/>

</svg>
</div>
</body>
</html>
