<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Educational Psychology SEM Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root{
  --accent:#520671;
  --accent-soft:#f6f0f8;
  --text:#161616;
  --muted:#6e6c66;
}
body{
  background:#fff;
  font-family:'DM Sans',sans-serif;
}
.wrap{
  max-width:1180px;
  margin:0 auto;
}
svg{
  width:100%;
  height:auto;
}
.latent{
  fill:var(--accent-soft);
  stroke:var(--accent);
  stroke-width:2.6;
}
.latent-muted{
  fill:#fff;
  stroke:#b8b3aa;
  stroke-width:2.2;
}
.outcome{
  fill:#fff;
  stroke:var(--accent);
  stroke-width:2.8;
}
.label{
  font-size:20px;
  font-weight:600;
  fill:var(--text);
}
.sub{
  font-size:13px;
  fill:var(--muted);
}
.type{
  font-family:'DM Mono',monospace;
  font-size:10px;
  fill:#9a9890;
  letter-spacing:.08em;
}
.path-main{
  stroke:var(--accent);
  stroke-width:3;
  fill:none;
  marker-end:url(#arrow-accent);
}
.path-neutral{
  stroke:#1a1a1a;
  stroke-width:2.4;
  fill:none;
  marker-end:url(#arrow-dark);
}
.path-neg{
  stroke:#9a9890;
  stroke-width:2;
  stroke-dasharray:6 6;
  fill:none;
  marker-end:url(#arrow-muted);
}
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 1100 520">
<defs>
<marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
  <path d="M 0 0 L 10 5 L 0 10 z" fill="#520671"/>
</marker>
<marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
  <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
</marker>
<marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
  <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a9890"/>
</marker>
</defs>

<!-- type labels -->
<text class="type" x="180" y="70" text-anchor="middle">COGNITIVE</text>
<text class="type" x="180" y="295" text-anchor="middle">AFFECTIVE</text>
<text class="type" x="560" y="120" text-anchor="middle">BEHAVIOURAL</text>
<text class="type" x="960" y="120" text-anchor="middle">OUTCOME</text>

<!-- nodes -->
<ellipse class="latent" cx="180" cy="150" rx="150" ry="68"/>
<text class="label" x="180" y="145" text-anchor="middle">Metacognition</text>
<text class="sub" x="180" y="170" text-anchor="middle">knowledge + regulation</text>

<ellipse class="latent-muted" cx="180" cy="370" rx="150" ry="62"/>
<text class="label" x="180" y="365" text-anchor="middle">Psychological Distress</text>
<text class="sub" x="180" y="390" text-anchor="middle">depression • anxiety • stress</text>

<ellipse class="latent" cx="560" cy="260" rx="170" ry="78"/>
<text class="label" x="560" y="252" text-anchor="middle">Executive Functioning</text>
<text class="sub" x="560" y="280" text-anchor="middle">monitoring • verification • control</text>

<rect class="outcome" x="850" y="188" width="220" height="144" rx="8"/>
<text class="label" x="960" y="252" text-anchor="middle">Academic</text>
<text class="label" x="960" y="278" text-anchor="middle">Achievement</text>

<!-- arrows -->
<line class="path-neutral" x1="330" y1="150" x2="390" y2="210" />
<line class="path-neg" x1="330" y1="370" x2="390" y2="310" />
<line class="path-main" x1="730" y1="260" x2="850" y2="260" />

</svg>
</div>
</body>
</html>
