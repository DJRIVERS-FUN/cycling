<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Research Engine</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:#fff;padding:0 10px;color:#1a1a1a;} .engine{padding-top:4px;} .title{font-size:20px;font-weight:500;} .subtitle{font-family:'DM Mono',monospace;font-size:12px;color:#9a9890;margin-top:4px;} .node{display:flex;margin:10px 0;cursor:pointer;} .spine{width:46px;display:flex;flex-direction:column;align-items:center;} .dot{width:30px;height:30px;border-radius:50%;background:#f0efeb;border:1.5px solid #d8d6d0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:#aaa;transition:all .3s;} .dot.active{background:#e05c2a;color:#fff;border-color:#e05c2a;} .line{width:1.5px;flex:1;background:#e4e2dc;} .card{margin-left:6px;} .label{font-family:'DM Mono';font-size:10px;letter-spacing:.1em;color:#c0beb8;} .name{font-size:14px;color:#888;} .detail{font-size:12px;color:#666;max-height:0;overflow:hidden;transition:.3s;} .active .detail{max-height:120px;margin-top:5px;}</style></head><body><div class="engine"><div class="title">Research Engine</div><div class="subtitle">Behaviour → Data → Modelling → Insight → Adaptation</div><div id="flow"></div></div><script>const steps=[{label:"Behaviour",name:"Human Activity",detail:"Learning behaviour, decision-making, and physical interaction generate observable patterns."},{label:"Capture",name:"Data Generation",detail:"Surveys, LMS logs, physiological signals, and sensor data capture behavioural evidence."},{label:"Structure",name:"Data Processing",detail:"Cleaning, structuring, and linking datasets into analyzable formats."},{label:"Analysis",name:"Modelling",detail:"Statistical and computational models reveal structure, relationships, and predictors."},{label:"Output",name:"Insight",detail:"Findings translated into interpretable results for learning, performance, and systems."},{label:"Impact",name:"Intervention & Design",detail:"Application to teaching, training, and human–machine systems."},{label:"Loop",name:"Adaptation",detail:"Behaviour changes based on feedback — restarting the cycle."}];let current=0;function render(){const el=document.getElementById('flow');el.innerHTML='';steps.forEach((s,i)=>{const active=i===current?'active':'';el.innerHTML+=`<div class="node ${active}" onclick="set(${i})"><div class="spine"><div class="dot ${active}">${i+1}</div>${i<steps.length-1?'<div class="line"></div>':''}</div><div class="card"><div class="label">${s.label}</div><div class="name">${s.name}</div><div class="detail">${s.detail}</div></div></div>`;});}function set(i){current=i;render();}render();</script></body></html>
