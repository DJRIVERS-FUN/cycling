<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Workflow: Human–Machine Performance Regulation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    margin: 0;
    padding: 0;
    background: #ffffff;
    color: #1a1a1a;
    font-family: 'DM Sans', sans-serif;
  }

  body {
    padding: 0 10px 10px 10px;
  }

  .wf-root {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 4px 0 0 0;
    width: 100%;
    max-width: 100%;
    position: relative;
    overflow: visible;
  }

  .wf-header {
    margin-bottom: 14px;
    position: relative;
  }

  .wf-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: #e05c2a;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .wf-title {
    font-size: 20px;
    font-weight: 500;
    color: #111111;
    line-height: 1.25;
  }

  .wf-subtitle {
    font-size: 12px;
    color: #9a9890;
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  .wf-track {
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .wf-step {
    display: flex;
    align-items: stretch;
    cursor: pointer;
  }

  .wf-spine {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 46px;
    flex-shrink: 0;
  }

  .wf-dot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1.5px solid #d8d6d0;
    background: #f0efeb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #b0aea8;
    flex-shrink: 0;
    transition: all 0.35s cubic-bezier(.4,0,.2,1);
    position: relative;
    z-index: 1;
    margin-top: 9px;
  }

  .wf-dot.active {
    background: #e05c2a;
    border-color: #e05c2a;
    color: #fff;
    box-shadow: 0 0 0 6px rgba(224,92,42,0.12);
  }

  .wf-dot.done {
    background: #edf5ef;
    border-color: #b8d8bf;
    color: #4a8f5c;
    font-size: 13px;
  }

  .wf-connector {
    width: 1.5px;
    flex: 1;
    margin: 0 auto;
    min-height: 10px;
    background: #e4e2dc;
    transition: background 0.5s;
  }

  .wf-connector.lit {
    background: linear-gradient(to bottom, rgba(224,92,42,0.45), rgba(224,92,42,0.06));
  }

  .wf-card {
    flex: 1;
    border: none;
    border-radius: 0;
    padding: 8px 0;
    margin: 5px 0 5px 6px;
    background: transparent;
    transition: all 0.35s cubic-bezier(.4,0,.2,1);
    position: relative;
    overflow: hidden;
  }

  .wf-card.active,
  .wf-card.done {
    background: transparent;
  }

  .wf-card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #c0beb8;
    margin-bottom: 3px;
    transition: color 0.3s;
  }

  .wf-card.active .wf-card-label {
    color: #c4541e;
  }

  .wf-card.done .wf-card-label {
    color: #4a8f5c;
  }

  .wf-card-name {
    font-size: 14px;
    font-weight: 500;
    color: #888680;
    line-height: 1.3;
    transition: color 0.35s;
  }

  .wf-card.active .wf-card-name {
    color: #1a1a1a;
  }

  .wf-card.done .wf-card-name {
    color: #4a7a58;
  }

  .wf-card-detail {
    font-size: 12px;
    color: #a0a09a;
    line-height: 1.5;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(.4,0,.2,1), opacity 0.3s;
    opacity: 0;
    margin-top: 0;
  }

  .wf-card.active .wf-card-detail {
    max-height: 110px;
    opacity: 1;
    margin-top: 5px;
    color: #6e6c66;
  }

  .wf-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
    position: relative;
  }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid #d8d6d0;
    color: #888680;
    padding: 7px 14px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover:not(:disabled) {
    border-color: #e05c2a;
    color: #e05c2a;
  }

  button.primary {
    background: #e05c2a;
    border-color: #e05c2a;
    color: #fff;
    padding: 7px 20px;
  }

  button.primary:hover:not(:disabled) {
    background: #c94f20;
    border-color: #c94f20;
  }

  button:disabled {
    opacity: 0.28;
    cursor: default;
  }

  .wf-progress {
    flex: 1;
    height: 2px;
    background: #e4e2dc;
    border-radius: 2px;
    overflow: hidden;
  }

  .wf-progress-fill {
    height: 100%;
    background: #e05c2a;
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  .wf-counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #c0beb8;
    white-space: nowrap;
  }

  .wf-auto {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(224,92,42,0.08);
    color: #e05c2a;
    border: 1px solid rgba(224,92,42,0.25);
    padding: 6px 11px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .wf-auto:hover,
  .wf-auto.on {
    background: rgba(224,92,42,0.16);
    border-color: rgba(224,92,42,0.5);
  }

  .wf-footer {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid #ece9e3;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .wf-footer-left {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #c8c6c0;
    letter-spacing: 0.06em;
  }

  .wf-dots {
    display: flex;
    gap: 5px;
  }

  .wf-pip {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #dedad4;
    transition: all 0.3s;
    cursor: pointer;
  }

  .wf-pip.active {
    background: #e05c2a;
  }

  .wf-pip.done {
    background: #7ab888;
  }

  .wf-pip:hover {
    transform: scale(1.3);
  }

  @media (max-width: 480px) {
    body {
      padding: 0 6px 8px 6px;
    }

    .wf-title {
      font-size: 17px;
    }

    .wf-controls {
      flex-wrap: wrap;
    }
  }
</style>
</head>

<body>

<div class="wf-root">
  <div class="wf-header">
    <div class="wf-eyebrow">Rivers Lab Research Workflow</div>
    <h1 class="wf-title">Human–Machine Performance Regulation</h1>
    <div class="wf-subtitle">Action → Data → Modelling → Feedback → Adaptation → Repeat</div>
  </div>

  <div class="wf-track" id="track"></div>

  <div class="wf-controls">
    <button id="btn-prev" onclick="prev()">← Back</button>
    <button class="primary" id="btn-next" onclick="next()">Next →</button>
    <div class="wf-progress"><div class="wf-progress-fill" id="prog"></div></div>
    <span class="wf-counter" id="counter">1 / 7</span>
    <button class="wf-auto" id="auto-btn" onclick="toggleAuto()">Auto</button>
  </div>

  <div class="wf-footer">
    <span class="wf-footer-left">Continuous feedback loop — each cycle informs the next</span>
    <div class="wf-dots" id="pips"></div>
  </div>
</div>

<script>
const stages = [
  {
    label: "Input",
    name: "Human Action",
    detail: "Pedalling, gear shifting, pacing — the physical inputs that initiate the data loop."
  },
  {
    label: "Capture",
    name: "Sensor Data Capture",
    detail: "Power meter, cadence sensor, heart rate monitor — continuous physiological measurement."
  },
  {
    label: "Logging",
    name: "Data Logging",
    detail: "Garmin Edge FIT files, Strava API — structured time-series recording of all ride variables."
  },
  {
    label: "Processing",
    name: "Data Processing",
    detail: "Python pipeline: cleaning, resampling, feature engineering, and anomaly detection."
  },
  {
    label: "Analysis",
    name: "Modelling",
    detail: "Regression, clustering, and machine learning models identify patterns and performance relationships."
  },
  {
    label: "Output",
    name: "Feedback",
    detail: "Interactive visualisations, cadence–power maps, dashboards, and training recommendations."
  },
  {
    label: "Adaptation",
    name: "Behavioural Adaptation",
    detail: "The rider adjusts training load, pacing strategy, and recovery — closing the feedback loop."
  }
];

let current = 0;
let autoPlaying = false;
let autoTimer = null;

function render() {
  const track = document.getElementById('track');
  track.innerHTML = '';

  stages.forEach((s, i) => {
    const isActive = i === current;
    const isDone = i < current;
    const dotClass = isActive ? 'active' : isDone ? 'done' : '';
    const cardClass = isActive ? 'active' : isDone ? 'done' : '';
    const connClass = isDone ? 'lit' : '';

    const connector = i < stages.length - 1
      ? `<div class="wf-connector ${connClass}"></div>`
      : '';

    const dotContent = isDone ? '✓' : i + 1;

    track.innerHTML += `
      <div class="wf-step" onclick="jump(${i})">
        <div class="wf-spine">
          <div class="wf-dot ${dotClass}">${dotContent}</div>
          ${connector}
        </div>
        <div class="wf-card ${cardClass}">
          <div class="wf-card-label">${s.label}</div>
          <div class="wf-card-name">${s.name}</div>
          <div class="wf-card-detail">${s.detail}</div>
        </div>
      </div>`;
  });

  const pct = (current / (stages.length - 1)) * 100;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('counter').textContent = `${current + 1} / ${stages.length}`;

  document.getElementById('btn-prev').disabled = current === 0;

  const nextBtn = document.getElementById('btn-next');
  nextBtn.disabled = current === stages.length - 1;
  nextBtn.textContent = current === stages.length - 1 ? 'Done ✓' : 'Next →';

  const pipsEl = document.getElementById('pips');
  pipsEl.innerHTML = '';

  stages.forEach((_, i) => {
    const cls = i === current ? 'active' : i < current ? 'done' : '';
    pipsEl.innerHTML += `<div class="wf-pip ${cls}" onclick="event.stopPropagation(); jump(${i})"></div>`;
  });
}

function next() {
  if (current < stages.length - 1) {
    current++;
    render();
  } else {
    stopAuto();
  }
}

function prev() {
  if (current > 0) {
    current--;
    render();
  }
}

function jump(i) {
  current = i;
  render();
}

function toggleAuto() {
  if (autoPlaying) {
    stopAuto();
  } else {
    startAuto();
  }
}

function startAuto() {
  autoPlaying = true;
  const btn = document.getElementById('auto-btn');
  btn.classList.add('on');
  btn.textContent = 'Stop';

  if (current === stages.length - 1) {
    current = -1;
  }

  autoTimer = setInterval(() => {
    if (current < stages.length - 1) {
      current++;
      render();
    } else {
      stopAuto();
    }
  }, 900);
}

function stopAuto() {
  autoPlaying = false;
  clearInterval(autoTimer);

  const btn = document.getElementById('auto-btn');
  btn.classList.remove('on');
  btn.textContent = 'Auto';
}

render();
</script>

</body>
</html>
