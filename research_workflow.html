<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human–Machine Workflow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100%;
    background: #ffffff;
    color: #171717;
    font-family: 'DM Sans', sans-serif;
  }

  body { padding: 0 14px 14px; }

  .wrap { max-width: 1080px; margin: 0 auto; }

  .header { margin-bottom: 22px; }

  .eyebrow, .subtitle, .num, .label, .footer {
    font-family: 'DM Mono', monospace;
  }

  .eyebrow {
    color: #e05c2a;
    font-size: 12px;
    letter-spacing: .16em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 30px;
    font-weight: 500;
    line-height: 1.12;
  }

  .subtitle {
    color: #9a9890;
    font-size: 13px;
    margin-top: 8px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border: 1px solid #ece9e3;
    border-right: 0;
  }

  .stage {
    min-height: 210px;
    border-right: 1px solid #ece9e3;
    display: grid;
    grid-template-rows: 48px 34px 1fr;
    padding: 16px 14px;
  }

  .num {
    width: 30px;
    height: 30px;
    display: grid;
    place-items: center;
    border: 1.5px solid #d8d6d0;
    border-radius: 50%;
    background: #f4f2ed;
    font-size: 11px;
  }

  .label {
    color: #c4541e;
    font-size: 10px;
    letter-spacing: .13em;
    text-transform: uppercase;
  }

  .title {
    font-size: 18px;
    font-weight: 500;
  }

  .footer {
    display: grid;
    grid-template-columns: repeat(5, auto);
    gap: 12px;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid #ece9e3;
    color: #b8b3aa;
    font-size: 11px;
  }

  .footer span:not(:last-child)::after {
    content: '→';
    margin-left: 12px;
  }
</style>
</head>
<body>
<main class="wrap">
  <header class="header">
    <div class="eyebrow">Rivers Lab Research Workflow</div>
    <h1>Human–Machine Performance Regulation</h1>
    <div class="subtitle">A consistent system from action to adaptation</div>
  </header>

  <section class="grid">
    <div class="stage"><div class="num">01</div><div class="label">Input</div><div class="title">Human Action</div></div>
    <div class="stage"><div class="num">02</div><div class="label">Capture</div><div class="title">Sensor Data</div></div>
    <div class="stage"><div class="num">03</div><div class="label">Logging</div><div class="title">Ride Data</div></div>
    <div class="stage"><div class="num">04</div><div class="label">Process</div><div class="title">Data Prep</div></div>
    <div class="stage"><div class="num">05</div><div class="label">Analysis</div><div class="title">Modelling</div></div>
    <div class="stage"><div class="num">06</div><div class="label">Output</div><div class="title">Feedback</div></div>
    <div class="stage"><div class="num">07</div><div class="label">Adapt</div><div class="title">Behaviour Change</div></div>
  </section>

  <footer class="footer">
    <span>Act</span>
    <span>Measure</span>
    <span>Record</span>
    <span>Model</span>
    <span>Adapt</span>
  </footer>
</main>
</body>
</html>
