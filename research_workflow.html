<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Research Workflow: Human–Machine Performance Regulation</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;min-height:100%;margin:0;padding:0;background:#fff;color:#1a1a1a;font-family:'DM Sans',sans-serif}body{padding:0 14px 14px}.wf-root{background:transparent;border:none;padding:2px 0 0;width:100%;max-width:100%;position:relative;overflow:visible}.wf-header{margin-bottom:24px}.wf-eyebrow{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.16em;color:#e05c2a;text-transform:uppercase;margin-bottom:7px}.wf-title{font-size:32px;font-weight:500;color:#111;line-height:1.15}.wf-subtitle{font-size:15px;color:#9a9890;margin-top:7px;font-family:'DM Mono',monospace;letter-spacing:.04em}.wf-track{display:flex;flex-direction:column;position:relative}.wf-step{display:flex;align-items:stretch;cursor:pointer}.wf-spine{display:flex;flex-direction:column;align-items:center;width:66px;flex-shrink:0}.wf-dot{width:42px;height:42px;border-radius:50%;border:1.5px solid #d8d6d0;background:#f0efeb;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:14px;color:#b0aea8;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;margin-top:10px}.wf-dot.active{background:#e05c2a;border-color:#e05c2a;color:#fff;box-shadow:0 0 0 8px rgba(224,92,42,.12)}.wf-dot.done{background:#edf5ef;border-color:#b8d8bf;color:#4a8f5c;font-size:15px}.wf-connector{width:1.5px;flex:1;margin:0 auto;min-height:18px;background:#e4e2dc;transition:background .5s}.wf-connector.lit{background:linear-gradient(to bottom,rgba(224,92,42,.45),rgba(224,92,42,.06))}.wf-card{flex:1;border:none;padding:14px 0;margin:6px 0 6px 10px;background:transparent;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}.wf-card-label{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#c0beb8;margin-bottom:5px;transition:color .3s}.wf-card.active .wf-card-label{color:#c4541e}.wf-card.done .wf-card-label{color:#4a8f5c}.wf-card-name{font-size:21px;font-weight:500;color:#888680;line-height:1.24;transition:color .35s}.wf-card.active .wf-card-name{color:#1a1a1a}.wf-card.done .wf-card-name{color:#4a7a58}.wf-card-detail{font-size:16px;color:#a0a09a;line-height:1.6;max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0;margin-top:0}.wf-card.active .wf-card-detail{max-height:190px;opacity:1;margin-top:9px;color:#6e6c66}.wf-controls{display:flex;align-items:center;gap:10px;margin-top:26px}.wf-controls button{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;background:transparent;border:1px solid #d8d6d0;color:#888680;padding:9px 16px;border-radius:7px;cursor:pointer;transition:all .2s}.wf-controls button:hover:not(:disabled){border-color:#e05c2a;color:#e05c2a}.wf-controls button.primary{background:#e05c2a;border-color:#e05c2a;color:#fff;padding:9px 24px}.wf-controls button.primary:hover:not(:disabled){background:#c94f20;border-color:#c94f20}.wf-controls button:disabled{opacity:.28;cursor:default}.wf-progress{flex:1;height:2px;background:#e4e2dc;border-radius:2px;overflow:hidden}.wf-progress-fill{height:100%;background:#e05c2a;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}.wf-counter{font-family:'DM Mono',monospace;font-size:12px;color:#c0beb8;white-space:nowrap}.wf-auto{font-family:'DM Mono',monospace;font-size:11px!important;letter-spacing:.1em;text-transform:uppercase;background:rgba(224,92,42,.08)!important;color:#e05c2a!important;border:1px solid rgba(224,92,42,.25)!important;padding:8px 13px!important;border-radius:6px;cursor:pointer;white-space:nowrap}.wf-auto.on{background:rgba(224,92,42,.16)!important;border-color:rgba(224,92,42,.5)!important}.wf-footer{margin-top:22px;padding-top:14px;border-top:1px solid #ece9e3;display:flex;justify-content:space-between;align-items:center}.wf-footer-left{font-family:'DM Mono',monospace;font-size:11px;color:#c8c6c0;letter-spacing:.06em}.wf-dots{display:flex;gap:6px}.wf-pip{width:7px;height:7px;border-radius:50%;background:#dedad4;transition:all .3s;cursor:pointer}.wf-pip.active{background:#e05c2a}.wf-pip.done{background:#7ab888}.wf-pip:hover{transform:scale(1.3)}@media(max-width:480px){body{padding:0 6px 8px}.wf-header{margin-bottom:14px}.wf-eyebrow{font-size:10px}.wf-title{font-size:20px}.wf-subtitle{font-size:11px}.wf-dot{width:31px;height:31px;font-size:11px}.wf-spine{width:45px}.wf-card{padding:8px 0;margin-left:6px}.wf-card-label{font-size:9px}.wf-card-name{font-size:15px}.wf-card-detail{font-size:12px}.wf-controls{flex-wrap:wrap}.wf-footer-left{font-size:9px}}</style></head><body><div class="wf-root"><div class="wf-header"><div class="wf-eyebrow">Rivers Lab Research Workflow</div><h1 class="wf-title">Human–Machine Performance Regulation</h1><div class="wf-subtitle">Action → Data → Modelling → Feedback → Adaptation → Repeat</div></div><div class="wf-track" id="track"></div><div class="wf-controls"><button id="btn-prev" onclick="prev()">← Back</button><button class="primary" id="btn-next" onclick="next()">Next →</button><div class="wf-progress"><div class="wf-progress-fill" id="prog"></div></div><span class="wf-counter" id="counter">1 / 7</span><button class="wf-auto on" id="auto-btn" onclick="toggleAuto()">Stop</button></div><div class="wf-footer"><span class="wf-footer-left">Continuous feedback loop — each cycle informs the next</span><div class="wf-dots" id="pips"></div></div></div><script>const stages=[{label:'Input',name:'Human Action',detail:'Pedalling, gear shifting, pacing — the physical inputs that initiate the data loop.'},{label:'Capture',name:'Sensor Data Capture',detail:'Power meter, cadence sensor, heart rate monitor — continuous physiological measurement.'},{label:'Logging',name:'Data Logging',detail:'Garmin Edge FIT files, Strava API — structured time-series recording of all ride variables.'},{label:'Processing',name:'Data Processing',detail:'Python pipeline: cleaning, resampling, feature engineering, and anomaly detection.'},{label:'Analysis',name:'Modelling',detail:'Regression, clustering, and machine learning models identify patterns and performance relationships.'},{label:'Output',name:'Feedback',detail:'Interactive visualisations, cadence–power maps, dashboards, and training recommendations.'},{label:'Adaptation',name:'Behavioural Adaptation',detail:'The rider adjusts training load, pacing strategy, and recovery — closing the feedback loop.'}];let current=0,autoPlaying=true,autoTimer=null;function render(){const track=document.getElementById('track');track.innerHTML='';stages.forEach((s,i)=>{const isActive=i===current,isDone=i<current,dotClass=isActive?'active':isDone?'done':'',cardClass=isActive?'active':isDone?'done':'',connClass=isDone?'lit':'',connector=i<stages.length-1?`<div class="wf-connector ${connClass}"></div>`:'',dotContent=isDone?'✓':i+1;track.innerHTML+=`<div class="wf-step" onclick="jump(${i})"><div class="wf-spine"><div class="wf-dot ${dotClass}">${dotContent}</div>${connector}</div><div class="wf-card ${cardClass}"><div class="wf-card-label">${s.label}</div><div class="wf-card-name">${s.name}</div><div class="wf-card-detail">${s.detail}</div></div></div>`});const pct=current/(stages.length-1)*100;document.getElementById('prog').style.width=pct+'%';document.getElementById('counter').textContent=`${current+1} / ${stages.length}`;document.getElementById('btn-prev').disabled=current===0;const nextBtn=document.getElementById('btn-next');nextBtn.disabled=current===stages.length-1;nextBtn.textContent=current===stages.length-1?'Done ✓':'Next →';const pipsEl=document.getElementById('pips');pipsEl.innerHTML='';stages.forEach((_,i)=>{const cls=i===current?'active':i<current?'done':'';pipsEl.innerHTML+=`<div class="wf-pip ${cls}" onclick="event.stopPropagation();jump(${i})"></div>`})}function next(){current=(current+1)%stages.length;render()}function prev(){current=(current-1+stages.length)%stages.length;render()}function jump(i){current=i;render()}function toggleAuto(){autoPlaying?stopAuto():startAuto()}function startAuto(){autoPlaying=true;const btn=document.getElementById('auto-btn');btn.classList.add('on');btn.textContent='Stop';autoTimer=setInterval(()=>{current=(current+1)%stages.length;render()},900)}function stopAuto(){autoPlaying=false;clearInterval(autoTimer);const btn=document.getElementById('auto-btn');btn.classList.remove('on');btn.textContent='Auto'}render();setTimeout(startAuto,800);</script></body></html>
