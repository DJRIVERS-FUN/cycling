<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Human–Machine Performance Visualization</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#fff;color:#1a1a1a;font-family:'DM Sans',sans-serif;overflow:hidden}
body{padding:0}.rm-root{width:100%;height:100%;display:flex;flex-direction:column;background:#fff}.map-wrap{position:relative;flex:1 1 auto;min-height:520px;border-top:1px solid #ece9e3;border-bottom:1px solid #ece9e3;overflow:hidden;background:#f8f7f4}svg{width:100%;height:100%;display:block}.map-bg{fill:#f6f5f1}.water{fill:#e9f0f2;opacity:.9}.land-line{fill:none;stroke:#e1ded6;stroke-width:1.2;opacity:.9}.road{fill:none;stroke:#ddd9d1;stroke-width:2.2;stroke-linecap:round;opacity:.75}.minor-road{fill:none;stroke:#ece8df;stroke-width:1.3;stroke-linecap:round;opacity:.75}.grid{fill:none;stroke:#eeeae2;stroke-width:1;opacity:.75}.zone{opacity:.12;mix-blend-mode:multiply}.zone.climb{fill:#7ab888}.zone.steady{fill:#520671}.zone.fast{fill:#4c5359}.zone.coast{fill:#2e6f9e}.route-base{fill:none;stroke:#ffffff;stroke-width:13;stroke-linecap:round;stroke-linejoin:round;opacity:.95;filter:drop-shadow(0 2px 8px rgba(40,40,40,.12))}.route-shadow{fill:none;stroke:#c9c5bd;stroke-width:17;stroke-linecap:round;stroke-linejoin:round;opacity:.55}.route-seg{fill:none;stroke-width:7.5;stroke-linecap:round;stroke-linejoin:round;opacity:.92}.route-seg.steady{stroke:#520671}.route-seg.climb{stroke:#7ab888;stroke-width:9.5}.route-seg.fast{stroke:#4c5359;stroke-width:6.5}.route-seg.coast{stroke:#bfc7cc;stroke-width:5.5}.route-dash{fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-dasharray:2 13;opacity:.7}.rider{fill:#520671;filter:drop-shadow(0 0 7px rgba(82,6,113,.45))}.pulse-ring{fill:none;stroke:#520671;stroke-width:2;opacity:0;transform-box:fill-box;transform-origin:center;animation:pulse 2s ease-out infinite}.pulse-ring.two{animation-delay:.7s}.pulse-ring.three{animation-delay:1.4s}@keyframes pulse{0%{r:5;opacity:.32}85%{r:28;opacity:0}100%{r:28;opacity:0}}.overlay{position:absolute;top:18px;left:18px;background:rgba(255,255,255,.82);backdrop-filter:blur(6px);border:1px solid rgba(236,233,227,.85);border-radius:12px;padding:13px 15px;min-width:178px}.overlay-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#520671;margin-bottom:8px}.overlay-row{display:flex;justify-content:space-between;gap:18px;font-family:'DM Mono',monospace;font-size:11px;color:#77746e;padding:3px 0;border-bottom:1px solid rgba(236,233,227,.7)}.overlay-row:last-child{border-bottom:0}.overlay-row strong{font-family:'DM Sans',sans-serif;font-size:15px;color:#111;font-weight:500;min-width:58px;text-align:right}.legend{position:absolute;right:18px;bottom:18px;background:rgba(255,255,255,.84);backdrop-filter:blur(6px);border:1px solid rgba(236,233,227,.85);border-radius:12px;padding:12px 14px;min-width:210px}.legend-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#c0beb8;margin-bottom:8px}.legend-item{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;color:#77746e;margin:6px 0;letter-spacing:.04em}.swatch{width:24px;height:7px;border-radius:999px;background:#d9d7d1}.swatch.purple{background:#520671}.swatch.green{background:#7ab888;height:9px}.swatch.dark{background:#4c5359;height:6px}.swatch.blue{background:#bfc7cc;height:5px}.map-note{position:absolute;left:18px;bottom:18px;font-family:'DM Mono',monospace;font-size:10px;color:#aaa7a0;letter-spacing:.06em;background:rgba(255,255,255,.72);padding:8px 10px;border-radius:999px;border:1px solid rgba(236,233,227,.75)}@media(max-width:700px){.map-wrap{min-height:520px}.overlay{top:10px;left:10px;min-width:155px;padding:10px}.legend{right:10px;bottom:10px;min-width:180px}.map-note{display:none}}
</style>
</head>
<body>
<div class="rm-root">
  <main class="map-wrap">
    <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Full ride route map with gear zones and moving rider cursor">
      <rect class="map-bg" x="0" y="0" width="1200" height="720" /><path class="water" d="M-20 580 C120 530 205 585 315 555 C445 520 560 575 690 550 C820 525 980 560 1220 510 L1220 740 L-20 740Z" /><path class="grid" d="M80 0 V720 M180 0 V720 M280 0 V720 M380 0 V720 M480 0 V720 M580 0 V720 M680 0 V720 M780 0 V720 M880 0 V720 M980 0 V720 M1080 0 V720 M0 80 H1200 M0 180 H1200 M0 280 H1200 M0 380 H1200 M0 480 H1200 M0 580 H1200 M0 680 H1200" /><path class="land-line" d="M45 510 C170 470 250 520 350 488 S565 468 715 500 S980 485 1150 428" /><path class="land-line" d="M70 135 C210 95 310 132 430 110 S665 78 798 114 S1025 150 1155 92" /><path class="road" d="M60 425 C150 382 240 388 330 340 S530 245 660 280 S835 372 945 330 S1090 255 1165 300" /><path class="road" d="M130 205 C285 205 360 265 480 240 S690 170 805 218 S980 292 1110 235" /><path class="minor-road" d="M92 610 C210 545 290 620 402 548 S590 435 715 460 S880 568 1050 492" /><path class="minor-road" d="M210 40 C250 175 360 188 400 318 S375 514 492 670" /><path class="minor-road" d="M740 36 C705 142 768 225 748 340 S650 520 702 690" />
      <circle class="zone steady" cx="410" cy="330" r="155" /><circle class="zone climb" cx="770" cy="220" r="132" /><circle class="zone fast" cx="930" cy="455" r="142" /><circle class="zone coast" cx="265" cy="510" r="112" />
      <path id="routePath" class="route-shadow" d="M155 510 C240 600 395 565 440 450 C490 318 355 260 455 175 C560 85 750 100 830 205 C895 290 755 357 840 445 C925 535 1085 487 1096 360 C1105 235 952 180 870 275 C770 392 640 645 445 603 C305 572 210 478 155 510" /><path class="route-base" d="M155 510 C240 600 395 565 440 450 C490 318 355 260 455 175 C560 85 750 100 830 205 C895 290 755 357 840 445 C925 535 1085 487 1096 360 C1105 235 952 180 870 275 C770 392 640 645 445 603 C305 572 210 478 155 510" /><path class="route-seg coast" d="M155 510 C240 600 395 565 440 450" /><path class="route-seg climb" d="M440 450 C490 318 355 260 455 175 C560 85 750 100 830 205" /><path class="route-seg steady" d="M830 205 C895 290 755 357 840 445" /><path class="route-seg fast" d="M840 445 C925 535 1085 487 1096 360 C1105 235 952 180 870 275" /><path class="route-seg steady" d="M870 275 C770 392 640 645 445 603" /><path class="route-seg climb" d="M445 603 C305 572 210 478 155 510" /><path class="route-dash" d="M155 510 C240 600 395 565 440 450 C490 318 355 260 455 175 C560 85 750 100 830 205 C895 290 755 357 840 445 C925 535 1085 487 1096 360 C1105 235 952 180 870 275 C770 392 640 645 445 603 C305 572 210 478 155 510" />
      <circle class="pulse-ring" cx="0" cy="0" r="5"><animateMotion dur="13s" repeatCount="indefinite"><mpath href="#routePath" /></animateMotion></circle><circle class="pulse-ring two" cx="0" cy="0" r="5"><animateMotion dur="13s" repeatCount="indefinite"><mpath href="#routePath" /></animateMotion></circle><circle class="pulse-ring three" cx="0" cy="0" r="5"><animateMotion dur="13s" repeatCount="indefinite"><mpath href="#routePath" /></animateMotion></circle><circle class="rider" r="8"><animateMotion dur="13s" repeatCount="indefinite"><mpath href="#routePath" /></animateMotion></circle>
    </svg>
    <div class="overlay"><div class="overlay-label">Current Trace</div><div class="overlay-row"><span>Power</span><strong id="power">--</strong></div><div class="overlay-row"><span>Cadence</span><strong id="cadence">--</strong></div><div class="overlay-row"><span>Gear</span><strong id="gear">--</strong></div><div class="overlay-row"><span>State</span><strong id="state">--</strong></div></div>
    <div class="map-note">Simulated telemetry layer · replaceable with ride JSON</div>
    <div class="legend"><div class="legend-title">Route Encoding</div><div class="legend-item"><span class="swatch purple"></span>steady regulation</div><div class="legend-item"><span class="swatch green"></span>climbing adaptation</div><div class="legend-item"><span class="swatch dark"></span>high-speed ratio</div><div class="legend-item"><span class="swatch blue"></span>coast / transition</div></div>
  </main>
</div>
<script>
const telemetry=[{p:128,c:72,g:'42×28',s:'Coasting'},{p:185,c:81,g:'42×24',s:'Steady'},{p:238,c:76,g:'42×28',s:'Climbing'},{p:255,c:79,g:'42×24',s:'Climbing'},{p:211,c:88,g:'42×21',s:'Steady'},{p:176,c:94,g:'42×17',s:'Fast'},{p:158,c:98,g:'42×15',s:'Fast'},{p:142,c:82,g:'42×19',s:'Transition'},{p:224,c:84,g:'42×21',s:'Steady'},{p:248,c:78,g:'42×24',s:'Climbing'},{p:196,c:90,g:'42×19',s:'Steady'},{p:166,c:96,g:'42×15',s:'Fast'}];
let i=0;function updateTrace(){const d=telemetry[i%telemetry.length];document.getElementById('power').textContent=d.p+'W';document.getElementById('cadence').textContent=d.c+'rpm';document.getElementById('gear').textContent=d.g;document.getElementById('state').textContent=d.s;i++;}updateTrace();setInterval(updateTrace,1080);
</script>
</body>
</html>
