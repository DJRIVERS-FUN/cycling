<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strava Micro Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#ffffff; color:#6e6c66; font-family:'DM Sans'; }
  .wrap { font-size:12px; line-height:1.4; padding:6px 0; text-align:center; }
  .label { font-family:'DM Mono'; color:#520671; font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
  .headline { font-size:13px; color:#6e6c66; }
  .state { font-size:11px; color:#9a9890; }
  .metrics { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:2px; }
  .metric { font-size:11px; }
  a { color:#520671; text-decoration:none; }
  a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Rivers Lab / Behavioural System State</div>
  <div id="headline" class="headline">Loading…</div>
  <div id="state" class="state"></div>
  <div id="metrics" class="metrics"></div>
  <div class="state"><a href="https://www.strava.com/athletes/3714458" target="_blank">View Strava</a></div>
</div>

<script>
fetch('https://djrivers-fun.github.io/cycling/data/strava_footer.json?v='+Date.now())
.then(r=>r.json())
.then(d=>{
  document.getElementById('headline').textContent = d.headline;
  document.getElementById('state').textContent = d.state.load + ' · ' + d.state.context + ' · ' + d.state.climbing_density;
  const metrics = d.metrics.map(m=>`<div class="metric">${m.label}: ${m.value}</div>`).join('');
  document.getElementById('metrics').innerHTML = metrics;
});
</script>
</body>
</html>
