<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strava Behavioural State Footer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:rgb(238, 238, 238); font-family:'DM Sans', sans-serif; color:#6e6c66; }
  .wrap { padding:6px 0 4px 0; text-align:center; background:rgb(238, 238, 238); }
  .line1 {
    font-family:'DM Mono', monospace;
    font-size:12px;
    color:#520671;
    letter-spacing:0.05em;
    text-transform:uppercase;
    margin-bottom:2px;
  }
  .line2 {
    font-size:14px;
    line-height:1.3;
    font-weight:500;
    color:#6e6c66;
  }
  .context { color:#9a9890; font-weight:400; }
  a { color:#520671; text-decoration:none; }
  a:hover { text-decoration:underline; text-underline-offset:3px; }
</style>
</head>
<body>
<div class="wrap">
  <div id="label" class="line1">RIVERS LAB / LIVE BEHAVIOURAL STATE</div>
  <div id="ticker" class="line2">Loading…</div>
</div>

<script>
function normalizeLoad(raw){
  const value = (raw || '').toLowerCase();
  if(value.includes('high')) return 'HIGH LOAD STATE';
  if(value.includes('moderate')) return 'MODERATE LOAD STATE';
  if(value.includes('light')) return 'LIGHT LOAD STATE';
  if(value.includes('no')) return 'NO RECENT LOAD STATE';
  return 'LIVE BEHAVIOURAL STATE';
}

fetch('https://djrivers-fun.github.io/cycling/data/strava_footer.json?v=' + Date.now())
.then(r => r.json())
.then(d => {
  const loadState = normalizeLoad(d.state && d.state.load);
  const context = d.state && d.state.context ? d.state.context : 'context pending';
  const s = d.seven_day || {};
  const parts = [
    s.distance_km !== undefined ? `${s.distance_km} km` : null,
    s.moving_hours !== undefined ? `${s.moving_hours} h` : null,
    s.elevation_m !== undefined ? `${Math.round(s.elevation_m)} m` : null,
    s.avg_power_w ? `${s.avg_power_w} W` : null,
    s.avg_cadence_rpm ? `${s.avg_cadence_rpm} rpm` : null
  ].filter(Boolean);

  document.getElementById('label').textContent = `RIVERS LAB / ${loadState}`;
  document.getElementById('ticker').innerHTML =
    parts.join(' · ') +
    ` · <span class="context">${context}</span>` +
    ' · <a href="https://www.strava.com/athletes/3714458" target="_blank" rel="noopener noreferrer">Strava</a>';
})
.catch(() => {
  document.getElementById('label').textContent = 'RIVERS LAB / LIVE BEHAVIOURAL STATE';
  document.getElementById('ticker').textContent = 'Data pending';
});
</script>
</body>
</html>
