<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strava Footer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
<style>
html, body {
  margin:0;
  padding:0;
  background:#eeeeee;
  font-family:'DM Sans', sans-serif;
  color:#6e6c66;
  font-size:14px;
  line-height:1.3;
  overflow:hidden;
}
.wrap {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-height:42px;
  white-space:nowrap;
  background:#eeeeee;
  text-align:center;
}
.label {
  font-family:'DM Mono', monospace;
  color:#520671;
  text-transform:uppercase;
}
.sep {
  color:#9a9890;
}
.ticker {
  overflow:hidden;
  text-overflow:ellipsis;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">RIVERS LAB CYCLING WEEK</div>
  <div class="sep">|</div>
  <div id="ticker" class="ticker">Loading live data state…</div>
</div>
<script>
function normalizeLoad(raw) {
  const value = (raw || '').toLowerCase();
  if (value.includes('high')) return 'high data output';
  if (value.includes('moderate')) return 'moderate data output';
  if (value.includes('light')) return 'light data output';
  if (value.includes('no')) return 'no data output';
  return 'live data state';
}
fetch('https://djrivers-fun.github.io/cycling/data/strava_footer.json?v=' + Date.now())
.then(r => r.json())
.then(d => {
  const loadState = normalizeLoad(d.state && d.state.load);
  const s = d.seven_day || {};
  const parts = [
    s.distance_km !== undefined ? `${s.distance_km} km` : null,
    s.moving_hours !== undefined ? `${s.moving_hours} h` : null,
    s.elevation_m !== undefined ? `${Math.round(s.elevation_m)} m` : null,
    s.avg_power_w ? `${s.avg_power_w} W` : null,
    s.avg_cadence_rpm ? `${s.avg_cadence_rpm} rpm` : null
  ].filter(Boolean);
  document.getElementById('ticker').textContent = `${loadState}${parts.length ? ' · ' + parts.join(' · ') : ''}`;
})
.catch(() => {
  document.getElementById('ticker').textContent = 'data pending';
});
</script>
</body>
</html>
