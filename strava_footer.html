<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strava Footer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#ffffff; font-family:'DM Sans', sans-serif; color:#6e6c66; }

  .wrap { padding:6px 0 4px 0; text-align:center; }

  .line1 {
    font-family:'DM Mono', monospace;
    font-size:12px;
    color:#520671;
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin-bottom:2px;
  }

  .line2 {
    font-size:12px;
    line-height:1.3;
  }

  .meta {
    font-size:11px;
    color:#9a9890;
  }

  a { color:#520671; text-decoration:none; }
  a:hover { text-decoration:underline; text-underline-offset:3px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="line1">Rivers Lab / Strava</div>
  <div class="line2">
    <span id="msg">Loading…</span>
    <span id="meta" class="meta"></span>
    · <a href="https://www.strava.com/athletes/3714458" target="_blank">Profile</a>
  </div>
</div>

<script>
fetch('https://djrivers-fun.github.io/cycling/data/strava_footer.json?v='+Date.now())
.then(r=>r.json())
.then(d=>{
  document.getElementById('msg').textContent = d.message;
  if(d.latest_ride && d.latest_ride.date){
    document.getElementById('meta').textContent = ' · ' + d.latest_ride.date;
  }
});
</script>
</body>
</html>
