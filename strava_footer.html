<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strava Behavioural State Footer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:rgb(238, 238, 238); font-family:'DM Sans', sans-serif; color:#6e6c66; }
  .wrap { padding:6px 0; text-align:center; background:rgb(238, 238, 238); }
  .ticker {
    font-size:16px;
    font-weight:500;
    letter-spacing:0.01em;
    color:#6e6c66;
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="ticker" class="ticker">Loading…</div>
</div>

<script>
function normalizeLoad(raw){
  const value = (raw || '').toLowerCase();
  if(value.includes('high')) return 'HIGH LOAD STATE';
  if(value.includes('moderate')) return 'MODERATE LOAD STATE';
  if(value.includes('light')) return 'LIGHT LOAD STATE';
  if(value.includes('no')) return 'NO LOAD';
  return 'STATE';
}

fetch('https://djrivers-fun.github.io/cycling/data/strava_footer.json?v=' + Date.now())
.then(r => r.json())
.then(d => {
  const loadState = normalizeLoad(d.state && d.state.load);
  const s = d.seven_day || {};

  const parts = [
    'RIVERS LAB',
    loadState,
    s.distance_km !== undefined ? `${s.distance_km} km` : null,
    s.moving_hours !== undefined ? `${s.moving_hours} h` : null,
    s.elevation_m !== undefined ? `${Math.round(s.elevation_m)} m` : null,
    s.avg_power_w ? `${s.avg_power_w} W` : null,
    s.avg_cadence_rpm ? `${s.avg_cadence_rpm} rpm` : null
  ].filter(Boolean);

  document.getElementById('ticker').textContent = parts.join(' · ');
})
.catch(() => {
  document.getElementById('ticker').textContent = 'RIVERS LAB · DATA PENDING';
});
</script>
</body>
</html>
