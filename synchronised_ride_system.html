<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Synchronised Ride System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;min-height:100%;background:#fff;color:#1a1a1a;font-family:'DM Sans',sans-serif}body{padding:0}.sr-root{width:100%}.sr-panel{border-top:1px solid #ece9e3;border-bottom:1px solid #ece9e3;padding:12px 0}.dashboard{display:grid;grid-template-columns:1.35fr .95fr;gap:22px}.map{position:relative;height:440px;background:#f8f7f4;border:1px solid #ece9e3;overflow:hidden}.map svg{width:100%;height:100%;display:block}.water{fill:#e9f0f2}.grid{fill:none;stroke:#eeeae2;stroke-width:1}.road{fill:none;stroke:#dedad4;stroke-width:2;opacity:.75}.route-shadow{fill:none;stroke:#c9c5bd;stroke-width:16;stroke-linecap:round;stroke-linejoin:round;opacity:.5}.route-base{fill:none;stroke:#fff;stroke-width:12;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 2px 7px rgba(40,40,40,.1))}.route-seg{fill:none;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.steady{stroke:#e05c2a}.climb{stroke:#7ab888;stroke-width:9}.fast{stroke:#4c5359;stroke-width:6}.coast{stroke:#bfc7cc;stroke-width:5}.rider{fill:#e05c2a;filter:drop-shadow(0 0 7px rgba(224,92,42,.45))}.pulse{fill:none;stroke:#e05c2a;stroke-width:2;opacity:0;animation:pulse 1.8s ease-out infinite}@keyframes pulse{0%{r:5;opacity:.3}85%{r:25;opacity:0}100%{r:25;opacity:0}}.overlay{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.84);backdrop-filter:blur(6px);border:1px solid rgba(236,233,227,.85);border-radius:12px;padding:12px 14px;min-width:180px}.ol-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#c4541e;margin-bottom:7px}.ol-row{display:flex;justify-content:space-between;gap:16px;font-family:'DM Mono',monospace;font-size:11px;color:#77746e;padding:3px 0;border-bottom:1px solid rgba(236,233,227,.7)}.ol-row:last-child{border-bottom:0}.ol-row strong{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#111}.right{display:grid;grid-template-rows:auto 1fr auto;gap:14px}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.metric{border-bottom:1px solid #ece9e3;padding-bottom:10px}.metric-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#c0beb8;margin-bottom:4px}.metric-value{font-size:25px;font-weight:500}.metric-note{font-family:'DM Mono',monospace;font-size:10px;color:#9a9890}.tracks{display:grid;gap:13px}.track{position:relative;height:72px;border-left:1px solid #ece9e3;border-bottom:1px solid #ece9e3;background:linear-gradient(to bottom,rgba(248,247,244,.75),rgba(255,255,255,0));overflow:hidden}.track-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#c0beb8;margin-bottom:5px}.segment{position:absolute;height:15px;border-radius:999px;background:#d9d7d1;top:28px}.segment.orange{background:#e05c2a}.segment.green{background:#7ab888}.segment.dark{background:#4c5359}.segment.blue{background:#bfc7cc}.bar{position:absolute;bottom:0;width:3.2%;border-radius:6px 6px 0 0;background:#d9d7d1}.bar.hot{background:#e05c2a}.bar.dark{background:#4c5359}.line{position:absolute;left:0;top:0;width:100%;height:100%;display:block;pointer-events:none;z-index:1}.trace{fill:none;stroke:#e05c2a;stroke-width:2;stroke-dasharray:5 6;opacity:.55}.cursor{position:absolute;top:0;bottom:0;width:2px;background:#e05c2a;opacity:.85;left:0;transition:left .25s linear;z-index:2}.cursor:before{content:'';position:absolute;top:0;left:50%;width:9px;height:9px;border-radius:50%;background:#e05c2a;transform:translate(-50%,-50%);box-shadow:0 0 0 6px rgba(224,92,42,.12)}.legend{display:flex;flex-wrap:wrap;gap:11px;border-top:1px solid #ece9e3;padding-top:12px}.legend-item{display:flex;gap:7px;align-items:center;font-family:'DM Mono',monospace;font-size:10px;color:#77746e}.swatch{width:20px;height:7px;border-radius:999px;background:#d9d7d1}.swatch.orange{background:#e05c2a}.swatch.green{background:#7ab888}.swatch.dark{background:#4c5359}.swatch.blue{background:#bfc7cc}.footer{margin-top:10px;display:flex;justify-content:space-between;gap:14px}.note{font-family:'DM Mono',monospace;font-size:10px;color:#c8c6c0;letter-spacing:.06em}.pill{font-family:'DM Mono',monospace;font-size:10px;color:#e05c2a;background:rgba(224,92,42,.08);border:1px solid rgba(224,92,42,.25);border-radius:999px;padding:6px 11px;letter-spacing:.08em;text-transform:uppercase}.play{margin-top:10px;width:100%;height:2px;background:#e4e2dc;position:relative}.play-fill{height:100%;width:0;background:#e05c2a;transition:width .25s linear}@media(max-width:850px){.dashboard{grid-template-columns:1fr}.map{height:420px}.metric-value{font-size:21px}.footer{flex-direction:column}}</style>
</head>
<body>
<div class="sr-root">
<main class="sr-panel">
<div class="dashboard">
<section class="map">
<svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet">
<rect width="1200" height="720" fill="#f8f7f4"/>
<!-- rest unchanged -->
</svg>
</section>
</div>
</main>
</div>
<script>
// unchanged
</script>
</body></html>
